{% extends 'stor/base.html' %}
{% load static %}

{% block title %}تأكيد الطلب — ITQAN Tech{% endblock %}

{% block content %}
<div class="checkout-section">
    <div class="container" style="text-align:center; padding:80px 20px;">
        <i class="fas fa-shopping-cart" style="font-size:48px;color:var(--tq);margin-bottom:20px;display:block;"></i>
        <h2 style="font-weight:800;color:var(--ink);margin-bottom:12px;">يتم تأكيد الطلب من خلال السلة</h2>
        <p style="color:var(--ink-70);margin-bottom:24px;">أضف المنتجات إلى السلة ثم قم بتأكيد طلبك مباشرة.</p>
        <a href="{% url 'stor:cart' %}" class="btn btn-primary">
            <i class="fas fa-arrow-right me-2"></i>الذهاب إلى السلة
        </a>
    </div>
</div>
{% endblock %}
